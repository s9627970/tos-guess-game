<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神魔之塔 - 猜卡片挑戰</title>
    <style>
        :root {
            --primary-blue: #4db8ff;
            --success-green: #4caf50;
            --error-red: #ff5252;
            --panel-bg: rgba(42, 42, 64, 0.95);
        }

        body {
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            background: #1e1e2f url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }

        /* 狀態板 */
        #statusBoard {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--panel-bg);
            padding: 15px 25px;
            border-radius: 12px;
            border: 2px solid var(--primary-blue);
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            text-align: right;
            backdrop-filter: blur(5px);
            display: none;
        }
        #timerText { font-size: 24px; color: var(--error-red); font-weight: bold; display: block; }
        #scoreText { font-size: 18px; color: var(--primary-blue); font-weight: bold; }
        #currentRoundScore { font-size: 13px; color: #aaa; display: block; margin-top: 5px; }
        #currentRoundScore, #skipCountText { font-size: 13px; color: #aaa; display: block; margin-top: 5px; }

        /* 遮罩層通用樣式 */
        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(8px);
        }
        .overlay-content {
            background: #2a2a40;
            padding: 40px;
            border-radius: 20px;
            border: 3px solid var(--primary-blue);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .overlay h2 { color: var(--primary-blue); font-size: 32px; margin-top: 0; }
        
        .start-btn {
            background: var(--success-green); color: white; padding: 15px 40px;
            font-size: 20px; border-radius: 10px; cursor: pointer; border: none;
            transition: transform 0.2s, filter 0.2s;
            margin: 10px;
            width: 85%;
            font-weight: bold;
        }
        .start-btn:hover:not(:disabled) { transform: scale(1.05); filter: brightness(1.1); }
        .start-btn:disabled { background: #555; cursor: not-allowed; opacity: 0.7; }

        .mode-container { display: flex; gap: 15px; justify-content: center; margin-top: 20px; }
        .mode-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 15px 5px; height: 100px; font-size: 22px; width: auto;
        }

        /* 主容器 */
        .container {
            background-color: var(--panel-bg);
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center; max-width: 650px; width: 100%; margin-top: 60px;
            opacity: 0.3; pointer-events: none;
            transition: opacity 0.5s;
        }
        .container.active { opacity: 1; pointer-events: auto; }

        h1 { color: var(--primary-blue); margin-bottom: 20px; }

        .image-container {
            width: 100%; height: 500px; margin-bottom: 20px; border-radius: 10px;
            overflow: hidden; background-color: #000; display: flex; align-items: center;
            justify-content: center; position: relative; border: 2px solid #3a3a50;

            /* 新增這行，防止整個區塊被反白或長按選取 */
            user-select: none; 
            -webkit-user-select: none;
        }
        
        #cardImage { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            display: none; 
            
            /* --- 以下是新增的防作弊設定 --- */
            pointer-events: none;      /* 徹底禁止所有的滑鼠與觸控事件 */
            -webkit-user-drag: none;   /* 禁止在電腦版拖曳圖片 */
            user-select: none;         /* 禁止反白選取 */
            -webkit-user-select: none; /* 針對 Safari 的禁止選取 */
            touch-action: none;        /* 禁止手機端任何的觸控滑動或雙指縮放 */
        }
        
        #silhouetteContainer { width: 100%; height: 100%; position: relative; display: none; }
        .layer-img { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
            
            /* --- 以下是新增的防作弊設定 --- */
            pointer-events: none;      /* 徹底禁止所有的滑鼠與觸控事件 */
            -webkit-user-drag: none;   /* 禁止在電腦版拖曳圖片 */
            user-select: none;         /* 禁止反白選取 */
            -webkit-user-select: none; /* 針對 Safari 的禁止選取 */
            touch-action: none;        /* 禁止手機端任何的觸控滑動或雙指縮放 */
        }
        
        #tileGrid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(2, 1fr);
            z-index: 10; pointer-events: none;
        }

        .tile { 
            background-color: #1a1a2e; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: opacity 0.4s ease; 
            opacity: 1; box-sizing: border-box;
        }
        .tile.revealed { opacity: 0; }
        #loadingText { position: absolute; font-weight: bold; z-index: 15; color: var(--primary-blue); }

        /* 資訊猜卡表格樣式 */
        #infoModeContainer { display: none; width: 100%; margin-bottom: 20px; max-height: 500px; overflow-y: auto; }
        .info-table { width: 100%; border-collapse: separate; border-spacing: 5px 8px; font-size: 14px; }
        .info-table th { color: #aaa; font-weight: normal; padding-bottom: 5px; }
        .info-table td { 
            padding: 12px 5px; 
            text-align: center; 
            vertical-align: middle; 
            border-radius: 6px;
            background-color: var(--error-red);
            color: white;
            font-weight: bold;
            transition: background-color 0.3s;
        }
        .info-table td.name-cell { background-color: #2a2a40; font-weight: normal; } 
        .info-table td.match { background-color: var(--success-green) !important; }

        .info-card-cell { display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .info-card-cell img { width: 45px; height: 45px; border-radius: 5px; border: 1px solid #555; }

        .controls { position: relative; display: flex; flex-direction: column; gap: 12px; }
        #guessInput {
            padding: 14px; font-size: 16px; border-radius: 8px; border: 2px solid #4db8ff;
            background-color: #1e1e2f; color: white; width: 100%; box-sizing: border-box; outline: none;
        }

        .suggestions-dropdown {
            position: absolute; top: 55px; left: 0; width: 100%;
            background-color: #2a2a40; border: 1px solid var(--primary-blue); border-radius: 8px;
            max-height: 250px; overflow-y: auto; z-index: 100; display: none;
        }
        .suggestion-item { display: flex; align-items: center; gap: 12px; padding: 10px; cursor: pointer; border-bottom: 1px solid #3a3a50; }
        .suggestion-item:hover { background-color: #3e3e5a; }
        .suggestion-icon { width: 45px; height: 45px; border-radius: 5px; }

        .btn-group { display: flex; gap: 10px; }
        button { padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; font-size: 16px; }
        #submitBtn { background-color: var(--primary-blue); color: #1e1e2f; flex: 2; }
        #giveUpBtn { background-color: #f44336; color: white; flex: 1; }
        #nextBtn { background-color: var(--success-green); color: white; display: none; width: 100%; }

        #message { margin-top: 15px; font-size: 18px; font-weight: bold; min-height: 24px; }
        .success { color: var(--success-green); }
        .error { color: var(--error-red); }

        .history-container {
            background-color: var(--panel-bg);
            padding: 20px; border-radius: 15px; max-width: 650px; width: 100%; margin-top: 20px;
        }
        #guessHistoryList { list-style: none; padding: 0; display: flex; flex-direction: column-reverse; gap: 10px; max-height: 180px; overflow-y: auto; }
        .history-item { display: flex; align-items: center; gap: 15px; padding: 10px; background: #252538; border-radius: 8px; border-left: 5px solid #aaa; }
        .history-item.correct { border-left-color: var(--success-green); }
        .history-item.wrong { border-left-color: var(--error-red); }
        .history-icon { width: 40px; height: 40px; border-radius: 4px; }

        .flash-success { animation: flashG 0.4s; }
        .flash-error { animation: flashR 0.4s; }
        @keyframes flashG { 0% { background-color: rgba(76, 175, 80, 0.3); } 100% { background-color: transparent; } }
        @keyframes flashR { 0% { background-color: rgba(255, 82, 82, 0.3); } 100% { background-color: transparent; } }
        
        /* =========================================
           手機版專屬樣式 (寬度小於 768px 時生效) 
           ========================================= */
        @media (max-width: 768px) {
            /* 縮小圖片顯示區域的高度 */
            .image-container {
                height: 280px;
                margin-bottom: 15px;
            }
        }

        #mainTitle {
            font-size: 26px;      /* 這裡是文字大小，數字越大字越大 */
            margin-top: 10px;     /* 與上方的間距 */
            margin-bottom: 25px;  /* 與下方圖片的間距 */
            color: #ffffff;       /* 文字顏色 */
            text-shadow: 0 0 10px rgba(77, 184, 255, 0.5); /* 讓文字有點發光的感覺 */
        }
    </style>
</head>
<body>

<div id="statusBoard">
    <span id="timerText">剩餘時間：05:00</span>
    <span id="scoreText">總分：0</span>
    <span id="currentRoundScore">本題價值：50</span>
    <span id="skipCountText">跳過總次數：0</span> </div>
</div>

<div id="gameTypeOverlay" class="overlay">
    <div class="overlay-content">
        <h2>選擇遊戲玩法</h2>
        <button class="start-btn" style="background: #e91e63;" onclick="selectGameType('zoom')">🔍 圖片縮放猜卡</button>
        <button class="start-btn" style="background: #9c27b0;" onclick="selectGameType('silhouette')">🎞️ 圖片剪影猜卡</button>
        <button class="start-btn" style="background: #4caf50;" onclick="selectGameType('info')">📊 卡片資訊猜卡</button>
    </div>
</div>

<div id="modeSelectionOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <h2>選擇挑戰題庫</h2>
        <div class="mode-container">
            <button class="start-btn mode-btn" style="background: var(--primary-blue); color: #1e1e2f;" onclick="selectMode('all')">全部題庫</button>
            <button class="start-btn mode-btn" style="background: #ff9800;" onclick="selectMode('recent')">新卡題庫</button>
        </div>
        <p id="loadStatusText" style="margin-top:20px; color:#aaa; font-size:14px;"></p>
    </div>
</div>

<div id="timeSelectionOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <h2>選擇時間模式</h2>
        <div class="mode-container">
            <button class="start-btn mode-btn" style="background: var(--error-red); color: white;" onclick="selectTimeMode(true)">⏳ 限時挑戰<br><span style="font-size: 14px;">(5分鐘)</span></button>
            <button class="start-btn mode-btn" style="background: var(--success-green); color: white;" onclick="selectTimeMode(false)">☕ 休閒模式<br><span style="font-size: 14px;">(無時間限制)</span></button>
        </div>
    </div>
</div>

<div id="startOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <h2>挑戰規則</h2>
        <p id="ruleDescription"></p>
        <button id="realStartBtn" class="start-btn" onclick="initGame()" disabled>正在準備中...</button>
    </div>
</div>

<div id="resultOverlay" class="overlay" style="display: none;">
    <div class="overlay-content">
        <h2 id="resultTitle">時間到！</h2>
        <p id="finalResultText" style="font-size:22px;"></p>
        <button class="start-btn" style="background:var(--primary-blue)" onclick="location.reload()">再玩一次</button>
    </div>
</div>

<div class="container" id="gameMainContainer">
    <h1 id="mainTitle">神魔之塔 猜卡片</h1>
    
    <div class="image-container" id="imageContainerBlock">
        <span id="loadingText">請選擇模式</span>
        <img id="cardImage" src="" alt="卡片圖片">
        <div id="silhouetteContainer">
            <img id="colorImage" class="layer-img" src="" alt="彩色原圖">
            <div id="tileGrid"></div>
        </div>
    </div>

    <div id="infoModeContainer">
        <table class="info-table" id="infoTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>卡片名稱</th>
                    <th>屬性</th>
                    <th>種族</th>
                    <th>星級</th>
                    <th>標籤</th>
                </tr>
            </thead>
            <tbody id="infoTableBody"></tbody>
        </table>
    </div>
    
    <div class="controls">
        <input type="text" id="guessInput" placeholder="輸入卡片名稱..." autocomplete="off" disabled>
        <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
        <div class="btn-group" id="actionButtons">
            <button id="submitBtn" disabled>猜測 (Enter)</button>
            <button id="giveUpBtn" disabled>看答案</button>
        </div>
        <button id="nextBtn">下一張卡片 (Enter)</button>
    </div>
    <div id="message"></div>
</div>

<div class="history-container">
    <h3 style="margin: 0 0 10px 0; color: var(--primary-blue); font-size: 14px;">猜測紀錄</h3>
    <ul id="guessHistoryList"></ul>
</div>

<script>
    let cardsData = [];
    let gameCardsPool = []; 
    let currentCard = null;
    let hiddenTiles = [];
    let selectedPlayType = 'zoom'; 
    let isTimerEnabled = true; // 紀錄是否為限時模式
    let totalScore = 0;
    let correctCount = 0;
    let currentQuestionScore = 50;
    let timeLeft = 300;
    let gameTimer = null;
    let isDataLoaded = false;
    let skipCount = 0;

    const initialZoom = 8.0, zoomStep = 1.3;
    let currentZoom = initialZoom;
    let focusX = 50, focusY = 50;

    const dom = {
        imageContainerBlock: document.getElementById('imageContainerBlock'),
        infoModeContainer: document.getElementById('infoModeContainer'),
        infoTableBody: document.getElementById('infoTableBody'),
        cardImage: document.getElementById('cardImage'),
        silhouetteContainer: document.getElementById('silhouetteContainer'),
        colorImage: document.getElementById('colorImage'),
        tileGrid: document.getElementById('tileGrid'),
        loadingText: document.getElementById('loadingText'),
        guessInput: document.getElementById('guessInput'),
        suggestionsDropdown: document.getElementById('suggestionsDropdown'),
        submitBtn: document.getElementById('submitBtn'),
        nextBtn: document.getElementById('nextBtn'),
        giveUpBtn: document.getElementById('giveUpBtn'),
        message: document.getElementById('message'),
        historyList: document.getElementById('guessHistoryList'),
        actionButtons: document.getElementById('actionButtons'),
        scoreText: document.getElementById('scoreText'),
        timerText: document.getElementById('timerText'),
        currentRoundScore: document.getElementById('currentRoundScore'),
        skipCountText: document.getElementById('skipCountText'),
        gameTypeOverlay: document.getElementById('gameTypeOverlay'),
        modeSelectionOverlay: document.getElementById('modeSelectionOverlay'),
        timeSelectionOverlay: document.getElementById('timeSelectionOverlay'), // 新增
        loadStatusText: document.getElementById('loadStatusText'),
        startOverlay: document.getElementById('startOverlay'),
        resultOverlay: document.getElementById('resultOverlay'),
        resultTitle: document.getElementById('resultTitle'),
        finalResultText: document.getElementById('finalResultText'),
        mainTitle: document.getElementById('mainTitle'),
        ruleDescription: document.getElementById('ruleDescription'),
        gameMainContainer: document.getElementById('gameMainContainer'),
        statusBoard: document.getElementById('statusBoard'),
        realStartBtn: document.getElementById('realStartBtn')
    };

    function formatIconId(id) { return id.toString().padStart(4, '0'); }

    function selectGameType(type) {
        selectedPlayType = type;
        dom.gameTypeOverlay.style.display = 'none';
        
        if(type === 'zoom') {
            dom.mainTitle.innerText = "神魔之塔 - 圖片縮放猜卡";
            dom.modeSelectionOverlay.style.display = 'flex';
        } else if (type === 'silhouette') {
            dom.mainTitle.innerText = "神魔之塔 - 圖片剪影猜卡";
            dom.modeSelectionOverlay.style.display = 'flex';
        } else if (type === 'info') {
            dom.mainTitle.innerText = "神魔之塔 - 卡片資訊猜卡";
            loadMonsterList();
        }
    }

    async function selectMode(mode) {
        if (isDataLoaded) return;
        dom.loadStatusText.innerText = "正在讀取卡片資料，請稍候...";
        const btns = dom.modeSelectionOverlay.querySelectorAll('button');
        btns.forEach(b => b.disabled = true);

        try {
            const response = await fetch('card_name.txt?t=' + new Date().getTime());
            if (!response.ok) throw new Error("檔案讀取失敗");
            const text = await response.text();
            cardsData = [];
            text.split('\n').forEach((line) => {
                const match = line.trim().match(/^(\d+)\s+(.+)$/);
                if (match) cardsData.push({ id: match[1], name: match[2].trim() });
            });
            gameCardsPool = (mode === 'recent') ? cardsData.filter(c => parseInt(c.id, 10) > 10819) : cardsData;
            finishLoading();
        } catch (e) {
            dom.loadStatusText.innerHTML = `<span style="color:red">載入失敗: ${e.message}</span>`;
            btns.forEach(b => b.disabled = false);
        }
    }

    async function loadMonsterList() {
        try {
            const response = await fetch('monster_list.txt?t=' + new Date().getTime());
            if (!response.ok) throw new Error("檔案讀取失敗");
            const text = await response.text();
            cardsData = [];
            
            const regex = /id:(\d+)\s+name:(.+?)\s+attribute:(\S+)\s+race:(\S+)\s+star:(\d+)\s+first_tag:(.*)/;

            text.split('\n').forEach(line => {
                const match = line.trim().match(regex);
                if(match) {
                    cardsData.push({ 
                        id: match[1], 
                        name: match[2].trim(), 
                        attr: match[3], 
                        race: match[4], 
                        star: match[5], 
                        tag: match[6].trim()
                    });
                }
            });
            gameCardsPool = cardsData;
            finishLoading();
        } catch (e) {
            alert("載入 monster_list.txt 失敗：" + e.message);
        }
    }

    function finishLoading() {
        isDataLoaded = true;
        dom.modeSelectionOverlay.style.display = 'none';
        // 載入完成後，前往選擇時間模式
        dom.timeSelectionOverlay.style.display = 'flex';
    }

    // 選擇時間模式
    function selectTimeMode(isTimed) {
        isTimerEnabled = isTimed;
        dom.timeSelectionOverlay.style.display = 'none';
        
        // 根據選擇的時間模式與遊戲玩法動態設定規則文字
        let timeStr = isTimed ? "<strong style='color:var(--error-red);'>5 分鐘限時挑戰！</strong><br>" : "<strong style='color:var(--success-green);'>休閒模式（無時間限制）</strong><br>";
        
        if (selectedPlayType === 'zoom') {
            dom.ruleDescription.innerHTML = timeStr + "每題 50 分，猜錯扣 5 分並縮小圖片。";
        } else if (selectedPlayType === 'silhouette') {
            dom.ruleDescription.innerHTML = timeStr + "圖片分六格，初始隨機開一格。<br>猜錯扣 5 分並隨機增開一格。";
        } else if (selectedPlayType === 'info') {
            dom.ruleDescription.innerHTML = timeStr + "根據各項資訊縮小範圍。<br>格子的顏色會告訴你該項目是否與正確答案相符！<br>題庫為近一年的卡。";
        }

        dom.startOverlay.style.display = 'flex';
        dom.realStartBtn.disabled = false;
        dom.realStartBtn.innerText = "開始挑戰";
    }

    function initGame() {
        dom.startOverlay.style.display = 'none';
        dom.statusBoard.style.display = 'block';
        dom.gameMainContainer.classList.add('active');
        dom.guessInput.disabled = false;
        dom.submitBtn.disabled = false;
        dom.giveUpBtn.disabled = false;
        
        if (isTimerEnabled) {
            dom.timerText.style.display = 'block';
            startTimer();
        } else {
            dom.timerText.style.display = 'none'; // 休閒模式隱藏計時器
        }
        pickRandomCard();
    }

    function startTimer() {
        if (gameTimer) clearInterval(gameTimer);
        gameTimer = setInterval(() => {
            timeLeft--;
            let mins = Math.floor(timeLeft / 60);
            let secs = timeLeft % 60;
            dom.timerText.innerText = `剩餘時間：${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) { clearInterval(gameTimer); endChallenge(); }
        }, 1000);
    }

    function endChallenge() {
        dom.guessInput.disabled = true;
        dom.submitBtn.disabled = true;
        dom.resultOverlay.style.display = 'flex';
        dom.resultTitle.innerText = "時間到！";
        dom.finalResultText.innerHTML = `總分：${totalScore}<br>答對題數：${correctCount}`;
    }

    function pickRandomCard() {
        if (!gameCardsPool.length) return;
        const randomIndex = Math.floor(Math.random() * gameCardsPool.length);
        currentCard = gameCardsPool[randomIndex];
        currentQuestionScore = 50;
        updateUI();

        if (selectedPlayType === 'info') {
            dom.imageContainerBlock.style.display = 'none';
            dom.infoModeContainer.style.display = 'block';
            dom.infoTableBody.innerHTML = '';
            return; 
        }

        dom.imageContainerBlock.style.display = 'flex';
        dom.infoModeContainer.style.display = 'none';
        dom.cardImage.style.display = 'none';
        dom.silhouetteContainer.style.display = 'none';
        dom.loadingText.style.display = 'block';
        dom.loadingText.innerText = "載入卡片中...";

        const imgUrl = `https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/cards/${parseInt(currentCard.id, 10)}.jpg`;

        if(selectedPlayType === 'zoom') {
            dom.cardImage.src = imgUrl;
            dom.cardImage.onload = () => {
                dom.loadingText.style.display = 'none';
                dom.cardImage.style.display = 'block';
                focusX = Math.floor(Math.random() * 40) + 30; 
                focusY = Math.floor(Math.random() * 40) + 30; 
                currentZoom = initialZoom;
                applyZoom();
            };
            dom.cardImage.onerror = pickRandomCard;
        } else {
            dom.colorImage.src = imgUrl;
            dom.colorImage.onload = () => {
                dom.loadingText.style.display = 'none';
                dom.silhouetteContainer.style.display = 'block';
                setupVerticalTiles();
            };
            dom.colorImage.onerror = pickRandomCard;
        }
    }

    function setupVerticalTiles() { 
        dom.tileGrid.innerHTML = '';
        hiddenTiles = [];
        for (let i = 0; i < 6; i++) {
            const tile = document.createElement('div');
            tile.className = 'tile';
            dom.tileGrid.appendChild(tile);
            hiddenTiles.push(tile);
        }
        revealRandomTile();
    }

    function revealRandomTile() {
        if (hiddenTiles.length > 0) {
            const idx = Math.floor(Math.random() * hiddenTiles.length);
            hiddenTiles[idx].classList.add('revealed');
            hiddenTiles.splice(idx, 1);
        }
    }

    function updateUI() {
        dom.scoreText.innerText = `總分：${totalScore}`;
        dom.currentRoundScore.innerText = `本題價值：${currentQuestionScore}`;
        dom.message.innerText = '';
        dom.guessInput.value = '';
        dom.historyList.innerHTML = '';
        dom.nextBtn.style.display = 'none';
        dom.actionButtons.style.display = 'flex';
        dom.suggestionsDropdown.style.display = 'none';
    }

    function addInfoTableRow(guessed, target) {
        const tr = document.createElement('tr');
        
        const tdId = document.createElement('td');
        const gId = parseInt(guessed.id);
        const tId = parseInt(target.id);
        if (gId < tId) tdId.innerText = "↑ " + guessed.id;
        else if (gId > tId) tdId.innerText = "↓ " + guessed.id;
        else {
            tdId.innerText = guessed.id;
            tdId.classList.add('match');
        }
        tr.appendChild(tdId);

        const tdCard = document.createElement('td');
        tdCard.className = 'name-cell';
        tdCard.innerHTML = `<div class="info-card-cell">
            <img src="https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${formatIconId(guessed.id)}.jpg">
            <span style="line-height:1.2;">${guessed.name}</span>
        </div>`;
        tr.appendChild(tdCard);

        const tdAttr = document.createElement('td');
        tdAttr.innerText = guessed.attr;
        if (guessed.attr === target.attr) tdAttr.classList.add('match');
        tr.appendChild(tdAttr);

        const tdRace = document.createElement('td');
        tdRace.innerText = guessed.race;
        if (guessed.race === target.race) tdRace.classList.add('match');
        tr.appendChild(tdRace);

        const tdStar = document.createElement('td');
        tdStar.innerText = guessed.star;
        if (guessed.star === target.star) tdStar.classList.add('match');
        tr.appendChild(tdStar);

        const tdTag = document.createElement('td');
        tdTag.innerText = guessed.tag || '無';
        if (guessed.tag === target.tag) tdTag.classList.add('match');
        tr.appendChild(tdTag);

        dom.infoTableBody.appendChild(tr);
        dom.infoModeContainer.scrollTop = dom.infoModeContainer.scrollHeight;
    }

    function handleGuess(guessedCard) {
        if (selectedPlayType === 'info') {
            addInfoTableRow(guessedCard, currentCard);
        }

        if (guessedCard.name === currentCard.name) {
            totalScore += currentQuestionScore;
            correctCount++;
            flashEffect('success');
            endRound(true, `🎉 答對了！+${currentQuestionScore} 分`);
            addHistoryRecord(guessedCard, true);
        } else {
            currentQuestionScore = Math.max(0, currentQuestionScore - 5);
            flashEffect('error');
            
            if(selectedPlayType === 'zoom') {
                currentZoom = Math.max(1.0, currentZoom - zoomStep);
                applyZoom();
            } else if (selectedPlayType === 'silhouette') {
                revealRandomTile();
            }

            dom.currentRoundScore.innerText = `本題價值：${currentQuestionScore}`;
            dom.message.className = 'error';
            dom.message.innerText = '❌ 猜錯了！';
            addHistoryRecord(guessedCard, false);
            dom.guessInput.value = '';
        }
    }

    function endRound(isWin, msg) {
        if(selectedPlayType === 'zoom') {
            currentZoom = 1.0;
            applyZoom();
        } else if (selectedPlayType === 'silhouette') {
            dom.tileGrid.querySelectorAll('.tile').forEach(t => t.classList.add('revealed'));
        } else if (selectedPlayType === 'info') {
            dom.infoModeContainer.style.display = 'none';
            dom.imageContainerBlock.style.display = 'flex';
            dom.silhouetteContainer.style.display = 'none';
            dom.cardImage.style.display = 'block';
            dom.loadingText.style.display = 'none';
            dom.cardImage.src = `https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/cards/${parseInt(currentCard.id, 10)}.jpg`;
            dom.cardImage.style.transform = 'scale(1)';
        }

        dom.message.className = isWin ? 'success' : 'error';
        dom.message.innerText = msg;
        dom.actionButtons.style.display = 'none';
        dom.nextBtn.style.display = 'block';
    }

    function applyZoom() {
        dom.cardImage.style.transformOrigin = `${focusX}% ${focusY}%`;
        dom.cardImage.style.transform = `scale(${currentZoom})`;
    }

    function flashEffect(type) {
        dom.gameMainContainer.classList.remove('flash-success', 'flash-error');
        void dom.gameMainContainer.offsetWidth;
        dom.gameMainContainer.classList.add(type === 'success' ? 'flash-success' : 'flash-error');
    }

    dom.guessInput.addEventListener('input', () => {
        const val = dom.guessInput.value.trim();
        dom.suggestionsDropdown.innerHTML = '';
        if (!val) { dom.suggestionsDropdown.style.display = 'none'; return; }
        const matches = gameCardsPool.filter(c => c.name.includes(val));
        matches.forEach(card => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            div.innerHTML = `<img class="suggestion-icon" src="https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${formatIconId(card.id)}.jpg"><span>${card.name}</span>`;
            div.onclick = () => { dom.guessInput.value = card.name; dom.suggestionsDropdown.style.display = 'none'; handleGuess(card); };
            dom.suggestionsDropdown.appendChild(div);
        });
        dom.suggestionsDropdown.style.display = matches.length ? 'block' : 'none';
    });

    dom.guessInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = dom.guessInput.value.trim();
            const found = cardsData.find(c => c.name === val);
            if (found) { dom.suggestionsDropdown.style.display = 'none'; handleGuess(found); }
        }
    });

    window.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && dom.nextBtn.style.display === 'block') pickRandomCard();
    });

    dom.submitBtn.onclick = () => {
        const val = dom.guessInput.value.trim();
        const found = cardsData.find(c => c.name === val);
        if (found) handleGuess(found);
    };

    dom.giveUpBtn.onclick = () => {
        currentQuestionScore = 0;
        skipCount++; 
        dom.skipCountText.innerText = `跳過總次數：${skipCount}`;
        endRound(false, `💡 答案是：「${currentCard.name}」`);
    };

    dom.nextBtn.onclick = pickRandomCard;

    function addHistoryRecord(card, isCorrect) {
        const li = document.createElement('li');
        li.className = `history-item ${isCorrect ? 'correct' : 'wrong'}`;
        li.innerHTML = `<img class="history-icon" src="https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${formatIconId(card.id)}.jpg"><div style="flex-grow:1"><div style="font-size:14px; font-weight:bold;">${card.name}</div><div style="font-size:11px; opacity:0.6;">No. ${card.id}</div></div><span>${isCorrect ? '✔' : '✘'}</span>`;
        dom.historyList.appendChild(li);
        dom.historyList.scrollTop = dom.historyList.scrollHeight;
    }
</script>

</body>
</html>
