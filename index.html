<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神魔之塔 - 猜卡片遊戲</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2f url('background.jpg') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background-color: rgba(42, 42, 64, 0.95);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7);
            text-align: center;
            max-width: 600px;
            width: 100%;
            margin-bottom: 20px;
        }
        .image-container {
            width: 100%;
            max-width: 400px;
            height: 400px; /* 改為正方形更適合鎖定中心點 */
            margin: 0 auto 20px auto;
            border-radius: 10px;
            overflow: hidden;
            background-color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #cardImage {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 確保填滿容器 */
            display: none;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }
        #guessInput {
            padding: 12px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #4db8ff;
            background-color: #1e1e2f;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }
        .suggestions-dropdown {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            background-color: #2a2a40;
            border: 1px solid #4db8ff;
            border-radius: 8px;
            max-height: 250px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        .suggestion-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            cursor: pointer;
        }
        .suggestion-item:hover { background-color: #3a3a50; }
        .suggestion-icon { width: 40px; height: 40px; border-radius: 5px; }

        button { padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; }
        #submitBtn { background-color: #4db8ff; color: #1e1e2f; }
        #nextBtn { background-color: #4caf50; color: white; display: none; }
        #giveUpBtn { background-color: #f44336; color: white; }

        #message { margin-top: 20px; font-size: 18px; font-weight: bold; min-height: 24px; }
        .success { color: #4caf50; }
        .error { color: #f44336; }

        .history-container {
            background-color: rgba(29, 29, 41, 0.9);
            padding: 20px;
            border-radius: 15px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        #guessHistoryList {
            list-style: none; padding: 0; display: flex; flex-direction: column-reverse; gap: 8px;
            max-height: 250px; overflow-y: auto;
        }
        .history-item {
            display: flex; align-items: center; gap: 12px; padding: 8px;
            background: #2a2a40; border-radius: 6px; border-left: 4px solid #aaa;
        }
        .history-item.correct { border-left-color: #4caf50; }
        .history-item.wrong { border-left-color: #f44336; }
        .history-icon { width: 35px; height: 35px; border-radius: 4px; }
    </style>
</head>
<body>

<div class="container">
    <h1>神魔之塔 猜卡片</h1>
    
    <div class="image-container">
        <span id="loadingText">載入中...</span>
        <img id="cardImage" src="" alt="卡片圖片">
    </div>

    <div class="controls">
        <input type="text" id="guessInput" placeholder="輸入卡片名稱..." autocomplete="off" disabled>
        <div id="suggestionsDropdown" class="suggestions-dropdown"></div>
        <div style="display: flex; gap: 10px;">
            <button id="submitBtn" style="flex: 2;" disabled>猜測</button>
            <button id="giveUpBtn" style="flex: 1;" disabled>看答案</button>
        </div>
        <button id="nextBtn">下一張</button>
    </div>
    <div id="message"></div>
</div>

<div class="history-container">
    <h2 style="font-size: 16px; color: #4db8ff; margin-top: 0;">猜題記錄 (顯示猜測卡片)</h2>
    <ul id="guessHistoryList"></ul>
</div>

<script>
    let cardsData = [];
    let currentCard = null;
    let initialZoom = 6.0;   // 提高初始放大倍率
    let currentZoom = initialZoom;
    let zoomStep = 0.5;      // 每次猜錯縮小的幅度
    let focusX = 50, focusY = 50; // 鎖定的中心點

    const dom = {
        cardImage: document.getElementById('cardImage'),
        loadingText: document.getElementById('loadingText'),
        guessInput: document.getElementById('guessInput'),
        suggestionsDropdown: document.getElementById('suggestionsDropdown'),
        submitBtn: document.getElementById('submitBtn'),
        nextBtn: document.getElementById('nextBtn'),
        giveUpBtn: document.getElementById('giveUpBtn'),
        message: document.getElementById('message'),
        historyList: document.getElementById('guessHistoryList')
    };

    // 編號補零邏輯 (用於縮圖)
    function formatIconId(id) {
        return id.toString().padStart(4, '0');
    }

    async function loadTxtFile() {
        try {
            const response = await fetch('card_name.txt');
            const text = await response.text();
            processData(text);
        } catch (e) {
            dom.loadingText.innerText = "讀取失敗，請確認 run_game.py 是否執行。";
        }
    }

    function processData(text) {
        text.split('\n').forEach(line => {
            const match = line.trim().match(/^(\d+)\s+(.+)$/);
            if (match) cardsData.push({ id: match[1], name: match[2].trim() });
        });
        if (cardsData.length > 0) startGame();
    }

    function startGame() {
        dom.guessInput.disabled = false;
        dom.submitBtn.disabled = false;
        dom.giveUpBtn.disabled = false;
        pickRandomCard();
    }

    function pickRandomCard() {
        currentCard = cardsData[Math.floor(Math.random() * cardsData.length)];
        dom.cardImage.style.display = 'none';
        dom.loadingText.style.display = 'block';
        dom.message.innerText = '';
        dom.guessInput.value = '';
        dom.historyList.innerHTML = '';
        dom.nextBtn.style.display = 'none';
        dom.submitBtn.style.display = 'block';
        dom.giveUpBtn.style.display = 'block';

        // 設定大圖 (不補零)
        dom.cardImage.src = `https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/cards/${parseInt(currentCard.id, 10)}.jpg`;
        
        // 隨機選定中心點 (避開太邊緣的地方)
        focusX = Math.floor(Math.random() * 60) + 20;
        focusY = Math.floor(Math.random() * 60) + 20;
        currentZoom = initialZoom;
        applyZoom();
    }

    function applyZoom() {
        dom.cardImage.style.transformOrigin = `${focusX}% ${focusY}%`;
        dom.cardImage.style.transform = `scale(${currentZoom})`;
    }

    dom.cardImage.onload = () => {
        dom.loadingText.style.display = 'none';
        dom.cardImage.style.display = 'block';
    };

    dom.cardImage.onerror = () => { pickRandomCard(); };

    // 關鍵字搜尋與縮圖顯示
    dom.guessInput.addEventListener('input', () => {
        const val = dom.guessInput.value.trim();
        dom.suggestionsDropdown.innerHTML = '';
        if (!val) { dom.suggestionsDropdown.style.display = 'none'; return; }

        const matches = cardsData.filter(c => c.name.includes(val)).slice(0, 10);
        matches.forEach(card => {
            const div = document.createElement('div');
            div.className = 'suggestion-item';
            const iconId = formatIconId(card.id);
            div.innerHTML = `
                <img class="suggestion-icon" src="https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${iconId}.jpg">
                <span>${card.name}</span>
            `;
            div.onclick = () => {
                dom.guessInput.value = card.name;
                dom.suggestionsDropdown.style.display = 'none';
                handleGuess(card); // 傳入完整的卡片物件以取得正確縮圖
            };
            dom.suggestionsDropdown.appendChild(div);
        });
        dom.suggestionsDropdown.style.display = matches.length ? 'block' : 'none';
    });

    function handleGuess(guessedCard) {
        const isCorrect = guessedCard.name === currentCard.name;
        
        if (isCorrect) {
            currentZoom = 1.0;
            applyZoom();
            dom.message.className = 'success';
            dom.message.innerText = `🎉 答對了！這是「${currentCard.name}」`;
            dom.submitBtn.style.display = 'none';
            dom.giveUpBtn.style.display = 'none';
            dom.nextBtn.style.display = 'block';
        } else {
            currentZoom = Math.max(1.0, currentZoom - zoomStep);
            applyZoom();
            dom.message.className = 'error';
            dom.message.innerText = '❌ 猜錯了，細節變清楚了一點！';
            dom.guessInput.value = '';
        }
        
        addHistoryRecord(guessedCard, isCorrect);
    }

    // 按下猜測按鈕 (手動輸入的情況)
    dom.submitBtn.onclick = () => {
        const val = dom.guessInput.value.trim();
        const found = cardsData.find(c => c.name === val);
        if (found) handleGuess(found);
        else dom.message.innerText = '⚠️ 找不到這張卡片，請從清單選擇';
    };

    dom.giveUpBtn.onclick = () => {
        currentZoom = 1.0;
        applyZoom();
        dom.message.className = 'error';
        dom.message.innerText = `💡 答案是：「${currentCard.name}」`;
        dom.submitBtn.style.display = 'none';
        dom.giveUpBtn.style.display = 'none';
        dom.nextBtn.style.display = 'block';
    };

    dom.nextBtn.onclick = pickRandomCard;

    function addHistoryRecord(card, isCorrect) {
        const li = document.createElement('li');
        li.className = `history-item ${isCorrect ? 'correct' : 'wrong'}`;
        const iconId = formatIconId(card.id);
        li.innerHTML = `
            <img class="history-icon" src="https://d1h5mn9kk900cf.cloudfront.net/toswebsites/gallery/icons/${iconId}.jpg">
            <div style="flex-grow:1">
                <div style="font-size: 14px; font-weight: bold;">${card.name}</div>
                <div style="font-size: 12px; opacity: 0.8;">編號: ${card.id}</div>
            </div>
            <span>${isCorrect ? '✔' : '✘'}</span>
        `;
        dom.historyList.appendChild(li);
        dom.historyList.scrollTop = dom.historyList.scrollHeight;
    }

    window.onload = loadTxtFile;
</script>

</body>
</html>
